<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A42DD;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#6C63FF" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Background with gradient and shadow -->
  <rect width="84" height="84" x="8" y="8" rx="20" fill="url(#grad)" filter="url(#shadow)" />
  
  <!-- Trend / Bar chart -->
  <rect x="26" y="52" width="10" height="18" rx="3" fill="#ffffff" />
  <rect x="45" y="38" width="10" height="32" rx="3" fill="#ffffff" />
  <rect x="64" y="24" width="10" height="46" rx="3" fill="#ffffff" opacity="0.9" />

  <!-- Magnifying glass overlay (Audit) -->
  <circle cx="48" cy="48" r="22" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.95"/>
  <line x1="64" y1="64" x2="78" y2="78" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.95"/>
</svg>